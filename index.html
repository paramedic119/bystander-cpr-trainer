<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./javascript.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>胸骨圧迫復習アプリ - 正しい技術を身につける</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Libraries (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
      :root {
        --primary-color: #4ade80;
        --secondary-color: #60a5fa;
        --bg-color: #0f172a;
        --card-bg: #1e293b;
        --text-color: #f8fafc;
        --text-muted: #94a3b8;
        --danger-color: #f87171;
        --font-main: 'Zen Maru Gothic', sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--bg-color);
        color: var(--text-color);
        line-height: 1.6;
        overflow: hidden; /* スクロールを禁止 */
        -webkit-tap-highlight-color: transparent;
        display: flex;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }

      #app {
        width: 100%;
        max-width: 500px;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      .screen {
        display: none;
        flex: 1;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 1.5rem;
        width: 100%;
        height: 100%;
        overflow-y: auto; /* コンテンツが多い場合は内部スクロール */
        animation: fadeIn 0.3s ease-out;
      }

      .screen.active {
        display: flex;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Typography */
      h1 {
        font-size: 1.6rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
      }

      .subtitle {
        color: var(--text-muted);
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
        text-align: center;
      }

      /* Cards & Buttons */
      .card, .advice-card, .shadow {
        background: var(--card-bg);
        padding: 1.2rem;
        border-radius: 1.2rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        margin-bottom: 1.2rem;
        width: 100%;
      }

      .btn-primary, .btn-secondary, .btn-danger {
        width: 100%;
        padding: 1.2rem;
        font-size: 1.1rem;
        font-weight: bold;
        border: none;
        border-radius: 1rem;
        cursor: pointer;
        transition: transform 0.1s;
        font-family: var(--font-main);
        margin-bottom: 0.8rem;
        flex-shrink: 0;
      }

      .btn-primary { background-color: var(--primary-color); color: #064e3b; }
      .btn-secondary { background-color: #334155; color: var(--text-color); }
      .btn-danger { background-color: var(--danger-color); color: white; }

      .btn-primary:active, .btn-secondary:active, .btn-danger:active { transform: scale(0.96); }

      /* Measurement Layout - 縦長画面対応 */
      .full-screen { padding: 0 !important; overflow: hidden !important; }

      .camera-container {
        position: relative;
        width: 100%;
        flex: 1; /* 残りのスペースを全て使う */
        min-height: 0; /* flexアイテムが縮小できるようにするために必須 */
        background: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #output-canvas {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      #status-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      #countdown { font-size: 8rem; color: var(--primary-color); font-weight: bold; }
      #timer {
        position: absolute; top: 1rem; right: 1rem;
        background: rgba(0, 0, 0, 0.6); padding: 0.4rem 1rem; border-radius: 2rem;
        font-weight: bold; font-size: 1rem; z-index: 10;
      }

      #current-bpm-display {
        position: absolute; top: 1rem; left: 1rem;
        background: rgba(74, 222, 128, 0.2); 
        border: 1px solid var(--primary-color);
        padding: 0.4rem 1rem; border-radius: 2rem;
        font-weight: bold; font-size: 1rem; color: var(--primary-color);
        z-index: 10;
      }

      #metronome-visual {
        position: absolute; bottom: 1rem;
        width: 30px; height: 30px; background: var(--primary-color);
        border-radius: 50%; box-shadow: 0 0 15px var(--primary-color);
      }

      .measure-controls {
        width: 100%;
        padding: 1rem 1.5rem;
        background: var(--bg-color);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        flex-shrink: 0; /* このパネルは絶対に縮小させない */
      }

      .button-group-horizontal {
        display: flex;
        gap: 0.8rem;
        width: 100%;
      }
      .button-group-horizontal button { flex: 1; margin-bottom: 0; padding: 0.8rem; font-size: 0.9rem; }

      #processing-overlay {
        position: absolute;
        top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.8); padding: 1.5rem; border-radius: 1rem;
        color: var(--primary-color); font-weight: bold;
      }

      /* Results */
      .rank { font-size: 4rem; display: block; line-height: 1; margin-bottom: 0.5rem; }
      .rank-text { font-size: 1.2rem; color: var(--primary-color); font-weight: bold; margin-bottom: 1rem; }
      .evaluation-details { width: 100%; margin-bottom: 1rem; }
      .eval-item { display: flex; justify-content: space-between; padding: 0.6rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
      .status.pass { color: var(--primary-color); font-weight: bold; }
      .status.fail { color: var(--danger-color); font-weight: bold; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- 導入画面 -->
      <section id="screen-intro" class="screen active">
        <div class="content">
          <h1>胸骨圧迫復習アプリ</h1>
          <p class="subtitle">正しい技術を身につけましょう</p>
          <div class="card shadow">
            <p>救命講習のあとの復習に。スマホのカメラで「垂直な押し方」と「リズム」をAIが判定します。</p>
            <p class="note">※判定には<strong>真横から撮影した映像</strong>が必要です。</p>
          </div>
          <button id="btn-to-guide" class="btn-primary">カメラで計測する</button>
          <button id="btn-upload-trigger" class="btn-secondary">保存済みの動画で判定</button>
          <input type="file" id="input-video-file" accept="video/*" class="hidden">
        </div>
      </section>

      <!-- ガイド画面 -->
      <section id="screen-guide" class="screen">
        <div class="content">
          <h2 style="margin-bottom:1rem;">撮影のポイント</h2>
          <div class="guide-steps">
            <div class="step">
              <div class="step-number">1</div>
              <p>クッション等を床に置き、スマホを立てかけます。</p>
            </div>
            <div class="step warning">
              <div class="step-number">2</div>
              <p>スマホは必ずあなたの<strong>「真横」</strong>に置いてください。</p>
            </div>
            <div class="step">
              <div class="step-number">3</div>
              <p>全身（頭から腰まで）が映るように調整してください。</p>
            </div>
          </div>
          <button id="btn-to-measure" class="btn-primary">準備OK！</button>
          <button id="btn-back-to-intro" class="btn-secondary">戻る</button>
        </div>
      </section>

      <!-- 計測画面 -->
      <section id="screen-measure" class="screen full-screen">
        <div class="camera-container">
          <video id="input-video" playsinline muted style="display:none;"></video>
          <canvas id="output-canvas"></canvas>
          <div id="status-overlay">
            <div id="countdown" class="hidden">3</div>
            <div id="timer" class="hidden">00:15</div>
            <div id="current-bpm-display" class="hidden">-- BPM</div>
            <div id="metronome-visual" class="hidden"></div>
            <div id="processing-overlay" class="hidden">解析中...</div>
          </div>
        </div>
        <div class="measure-controls">
          <p id="instruction-text" style="text-align:center; margin-bottom: 0.6rem; font-size: 0.85rem; color: var(--text-muted);">姿勢を整えて「スタート」</p>
          <div class="button-group-horizontal">
            <button id="btn-start" class="btn-primary">スタート</button>
            <button id="btn-stop" class="btn-danger hidden">中止</button>
            <button id="btn-switch-camera" class="btn-secondary">切替</button>
            <button id="btn-back-to-intro-from-measure" class="btn-secondary">戻る</button>
          </div>
        </div>
      </section>

      <!-- 結果画面 -->
      <section id="screen-result" class="screen">
        <div class="content">
          <h2>復習結果</h2>
          <div id="result-score" class="score-display">
            <span class="rank">◎</span>
            <p class="rank-text">素晴らしいです！</p>
          </div>
          <div class="evaluation-details">
            <div class="eval-item">
              <span class="label">垂直押し</span>
              <span id="eval-vertical" class="status">合格</span>
            </div>
            <div class="eval-item">
              <span class="label">リズム</span>
              <span id="eval-rhythm" class="status">合格</span>
            </div>
          </div>
          <div class="advice-card shadow">
            <h3 style="margin-bottom:0.4rem; font-size:0.95rem;">アドバイス</h3>
            <p id="advice-text" style="font-size:0.85rem;">その調子で頑張りましょう！</p>
          </div>
          <button id="btn-retry" class="btn-primary">もう一度練習する</button>
        </div>
      </section>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
